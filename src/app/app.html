<app-header></app-header>
<div>
<h1>{{titulo}}</h1>
<label for="nome" placeholer="Digite seu nome">Nome:</label>
<input type="text" class="input-simples" id= "nome" (keyup) = "updateField($event)" (keyup) = "onKeyUp($event)" name="nome">

<label for="sobrenome" placeholder="Digite seu sobrenome">Sobrenome:</label>
<input type="text" class="input-simples" id= "sobrenome" (keyup) = "updateField($event)" (keyup) = "onKeyUp($event)" name="sobrenome">
<button [disabled] = "botaoDesabilitado" (click) = "onBotaoClicado()" class="input-submeter">{{textoBotao}}</button>

@if(mensagem){
    <div>{{mensagem}}</div>
}
</div>
<app-footer></app-footer>
<router-outlet/>
